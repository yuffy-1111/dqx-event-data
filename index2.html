<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DQXツール</title>
    <style>
        /* ===== 強制リセット ===== */
        * {
            box-sizing: border-box;
        }
        
        /* ★ これが重要：bodyの上部余白を固定 */
        body {
            margin: 0 !important;
            padding: 20px 0 0 0 !important;
            background: #eef2f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body.dark-mode {
            background: #0f172a;
            padding: 20px 0 0 0 !important;
        }
        
        /* メインコンテナ */
        #dqx-app {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 0 16px;
        }
        
        /* ★ ランチャーの上の余白をゼロに強制 */
        #dqx-app > div:first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
        
        /* ツールとの間隔（これは別） */
        #dqx-tool-container {
            margin-top: 24px !important;
        }
        
        /* スマホ時 */
        @media (max-width: 768px) {
            body {
                padding: 12px 0 0 0 !important;
            }
            #dqx-app {
                padding: 0 8px;
            }
            #dqx-tool-container {
                margin-top: 16px !important;
            }
        }
    </style>
</head>
<body>

<div id="dqx-app"></div>

<script src="./launcher.js"></script>
<script src="./tools/dqx-checker.js"></script>

<script>
window.addEventListener('load', function() {
    DQXTools.register('daily-checker', {
        name: 'コンテンツ<br>チェッカー',
        url: './tools/dqx-checker-2.js',
        renderFn: 'DQXDailyChecker.render'
    });
    
    DQXTools.register('exp-calc', {
        name: '傭兵用<br>多機能ツール',
        url: './tools/exp-calculator-2.js',
        renderFn: 'ExpCalculator.render'
    });
    
    DQXTools.init('dqx-app');
});
</script>

</body>
</html>
