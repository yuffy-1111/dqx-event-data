<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ユッフィーのDQXツール</title>
    <link rel="stylesheet" href="launcher.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0 !important;
            padding: 20px 0 0 0 !important;
            background: #eef2f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body.dark-mode {
            background: #0f172a;
            padding: 20px 0 0 0 !important;
        }
        #dqx-app {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 0 16px;
        }
        #dqx-app > div:first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
        #dqx-tool-container {
            margin-top: 24px !important;
            padding-bottom: 100px !important;
        }
        @media (max-width: 768px) {
            body {
                padding: 12px 0 0 0 !important;
            }
            #dqx-app {
                padding: 0 8px;
            }
            #dqx-tool-container {
                margin-top: 16px !important;
                padding-bottom: 120px !important;
            }
        }
        .maintenance-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .maintenance-text {
            font-size: 3rem;
            font-weight: bold;
            color: white;
            text-align: center;
            padding: 20px;
            background: #223a70;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
    </style>
    <script>
        const HTML_VERSION = '2.1.7';
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (typeof window.LAUNCHER_VERSION !== 'undefined') {
                    if (window.LAUNCHER_VERSION !== HTML_VERSION) {
                        alert('バージョン情報が一致しません。再読み込みします。');
                        location.reload(true);
                    }
                } else {
                    alert('新しいデータがあります。');
                    location.reload(true);
                }
            }, 500);
        });

        const skipMaintenance = localStorage.getItem('dqx_dev_mode') === 'true';
        const START_DATE = new Date('2026-05-15T23:50:00');
        const END_DATE   = new Date('2026-05-16T00:50:00');
        const MAINTENANCE_MODE = (new Date() >= START_DATE && new Date() <= END_DATE);

        if (MAINTENANCE_MODE && !skipMaintenance) {
            document.addEventListener('DOMContentLoaded', function() {
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0; left: 0;
                    width: 100%; height: 100%;
                    background: rgba(0, 0, 0, 0.85);
                    z-index: 10000;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    flex-direction: column;
                    font-family: sans-serif;
                `;
                overlay.innerHTML = `<div style="background: #223a70; padding: 30px 60px; border-radius: 20px; color: white; font-size: 2rem; font-weight: bold;">メンテナンス中<br>23:50〜00:50</div>`;
                document.body.appendChild(overlay);
            });
        }

        // ツール定義（ファイル名, グローバル名, 表示名, アイコン）
        const TEST_TOOLS = [
            { file: 'testtool.js', globalName: 'DQtool', name: '構成保存', icon: '📊' },
            { file: 'testtool2.js', globalName: 'DQtool2', name: '傭兵Webhook', icon: '📤' },
            { file: 'testtool3.js', globalName: 'DQtool3', name: '職人ツール', icon: '🛠️' }
        ];

        // テストツール読み込み関数
        function handleTestToolClick(filename, globalName, toolName) {
            const savedToken = localStorage.getItem('dqx_test_token');
            let token = savedToken;
            
            if (!token) {
                token = prompt(`🔑 ${toolName}を使用するためのGitHub APIトークンを入力してください（開発者専用）`);
                if (!token) return;
                localStorage.setItem('dqx_test_token', token);
            }
            
            const loadingDiv = document.createElement('div');
            loadingDiv.textContent = '読み込み中...';
            loadingDiv.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;color:#fff;padding:20px;border-radius:10px;z-index:10001;';
            document.body.appendChild(loadingDiv);
            
            const oldContainer = document.getElementById('dqx-tool-container');
            if (oldContainer) oldContainer.remove();
            
            const dqxApp = document.getElementById('dqx-app');
            const homeContainer = dqxApp.querySelector('.home-container');
            if (homeContainer) homeContainer.remove();
            
            fetch(`https://api.github.com/repos/rre1111/dqx-private-api/contents/${filename}`, {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3.raw'
                }
            })
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.text();
            })
            .then(code => {
                loadingDiv.remove();
                const script = document.createElement('script');
                script.textContent = code;
                document.head.appendChild(script);
                
                if (typeof window[globalName] !== 'undefined' && typeof window[globalName].render === 'function') {
                    const newContainer = document.createElement('div');
                    newContainer.id = 'dqx-tool-container';
                    dqxApp.appendChild(newContainer);
                    window[globalName].render('#dqx-tool-container');
                    
                    if (typeof DQXTools !== 'undefined') {
                        DQXTools.currentTool = `test-${filename}`;
                        DQXTools.renderToolMenu();
                    }
                } else {
                    throw new Error(`グローバル ${globalName} が見つかりません`);
                }
            })
            .catch(err => {
                loadingDiv.remove();
                console.error(err);
                alert(`認証失敗: ${err.message}`);
                localStorage.removeItem('dqx_test_token');
                if (typeof DQXTools !== 'undefined') {
                    DQXTools.showLauncher();
                }
            });
        }
    </script>
</head>
<body>
<div id="dqx-app"></div>
<script src="./launcher.js"></script>
<script>
window.addEventListener('load', function() {
    // 通常ツールの登録
    DQXTools.register('Checker', {
        name: 'コンテンツ<br>チェッカー',
        icon: '📋',
        desc: '進捗管理',
        url: './tools/checker.js',
        renderFn: 'Checker.render'
    });
    DQXTools.register('exp-m', {
        name: '傭兵用多機能ツール',
        icon: '⚔️',
        desc: '経験値計算<br>タイマー',
        url: './tools/expmercenary.js',
        renderFn: 'Expmercenary.render'
    });
    DQXTools.register('versions', {
        name: '傭兵用多機能ツール<br>旧ver',
        icon: '📜',
        desc: '旧verセレクタ',
        url: './tools/version_selector.js',
        renderFn: 'VersionSelector.render'
    });
    DQXTools.register('settings', {
        name: '設定',
        icon: '⚙️',
        desc: 'キャッシュ<br>フィードバック',
        url: './tools/settings.js',
        renderFn: 'Settings.render'
    });

    // テストツールをダミー登録（カード表示用、ツールバー非表示）
    TEST_TOOLS.forEach(tool => {
        DQXTools.register(`test_${tool.file}`, {
            name: `${tool.name} 🔒`,
            icon: tool.icon,
            desc: 'API認証',
            url: '',
            renderFn: '',
            hideInMenu: true
        });
    });

    DQXTools.init('dqx-app');

    // テストカードのクリック処理を上書き（loadToolをバイパス）
    setTimeout(() => {
        TEST_TOOLS.forEach(tool => {
            const card = document.querySelector(`.tool-card[data-tool-id="test_${tool.file}"]`);
            if (card) {
                // 元のonclickを保存
                const originalOnclick = card.onclick;
                // 上書き
                card.onclick = (e) => {
                    e.stopPropagation();
                    handleTestToolClick(tool.file, tool.globalName, tool.name);
                };
            }
        });
    }, 100);
});
</script>
</body>
</html>
