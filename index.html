<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ユッフィーのDQXツール</title>
    <link rel="stylesheet" href="launcher.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0 !important;
            padding: 20px 0 0 0 !important;
            background: #eef2f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body.dark-mode {
            background: #0f172a;
            padding: 20px 0 0 0 !important;
        }
        #dqx-app {
            max-width: 950px;
            margin: 0 auto;
            width: 100%;
            padding: 0 16px;
        }
        #dqx-app > div:first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
        #dqx-tool-container {
            margin-top: 24px !important;
            padding-bottom: 100px !important;
        }
        @media (max-width: 768px) {
            body {
                padding: 12px 0 0 0 !important;
            }
            #dqx-app {
                padding: 0 8px;
            }
            #dqx-tool-container {
                margin-top: 16px !important;
                padding-bottom: 120px !important;
            }
        }
        .maintenance-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .maintenance-text {
            font-size: 3rem;
            font-weight: bold;
            color: white;
            text-align: center;
            padding: 20px;
            background: #223a70;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
    </style>
    <script>
        const HTML_VERSION = '2.3.6';
        
        // リロード回数の管理（無限ループ防止）
        const RELOAD_KEY = 'dqx_reload_count';
        const MAX_RELOAD = 2;

        // ========== ストレージキーのクリーンアップ（毎読み込み時） ==========
        function cleanupStorage() {
            // 許可されたlocalStorage キーのリスト
            const allowedLocalStorageKeys = [
                'dqx_app_version',
                'dqx_card_order',
                'dqx_test_token',
                'dqx_dev_mode',
                'darkMode',
                'dqx_craft_last',
                'dqx_chars_final10',
                'dqx_disabled_final10',
                'dqx_hidden_tasks_v1',
                'dqx_limited_checks_v3'
            ];

            // ========== localStorageのクリーンアップ ==========
            for (let i = localStorage.length - 1; i >= 0; i--) {
                const key = localStorage.key(i);
                if (!key) continue;

                // 許可リストに含まれている、または'dqx_check_final10_'で始まるキーは保持
                const isAllowed = allowedLocalStorageKeys.includes(key) || key.startsWith('dqx_check_final10_');
                if (!isAllowed) {
                    try {
                        localStorage.removeItem(key);
                        console.log(`[Storage Cleanup] localStorage から削除: ${key}`);
                    } catch (e) {
                        console.warn(`[Storage Cleanup] localStorage の削除に失敗: ${key}`, e);
                    }
                }
            }

            // ========== sessionStorageのクリーンアップ ==========
            const allowedSessionStorageKeys = ['dqx_reload_count'];
            for (let i = sessionStorage.length - 1; i >= 0; i--) {
                const key = sessionStorage.key(i);
                if (!key) continue;

                if (!allowedSessionStorageKeys.includes(key)) {
                    try {
                        sessionStorage.removeItem(key);
                        console.log(`[Storage Cleanup] sessionStorage から削除: ${key}`);
                    } catch (e) {
                        console.warn(`[Storage Cleanup] sessionStorage の削除に失敗: ${key}`, e);
                    }
                }
            }
        }

        // ページ読み込み時にクリーンアップを実行
        document.addEventListener('DOMContentLoaded', cleanupStorage);

        // Pull to Refresh（スワイプ引っ張り再読み込み）禁止
        document.addEventListener('DOMContentLoaded', function() {
            let touchStartY = 0;
            document.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: false });
            document.addEventListener('touchmove', (e) => {
                const touchY = e.touches[0].clientY;
                if (touchY > touchStartY && window.scrollY === 0) {
                    e.preventDefault();
                }
            }, { passive: false });
        });
        
        function checkVersionAndReload() {
            let reloadCount = parseInt(sessionStorage.getItem(RELOAD_KEY)) || 0;
            
            setTimeout(function() {
                if (typeof window.LAUNCHER_VERSION !== 'undefined') {
                    if (window.LAUNCHER_VERSION !== HTML_VERSION) {
                        if (reloadCount < MAX_RELOAD) {
                            // リロード回数を増やして再読み込み
                            sessionStorage.setItem(RELOAD_KEY, reloadCount + 1);
                            alert(`バージョン情報が一致しません。再読み込みします。（${reloadCount + 1}/${MAX_RELOAD}）`);
                            location.reload(true);
                        } else {
                            // 上限に達したので旧バージョンで継続
                            sessionStorage.removeItem(RELOAD_KEY);
                            alert(`バージョンが一致しません。旧バージョンのツールを読み込みます。\n少し時間をおいて再読み込みしてください。`);
                            console.warn(`Version mismatch: LAUNCHER=${window.LAUNCHER_VERSION}, HTML=${HTML_VERSION} - 上限に達したため継続`);
                        }
                    } else {
                        // バージョン一致したらリロード回数をリセット
                        sessionStorage.removeItem(RELOAD_KEY);
                    }
                } else {
                    if (reloadCount < MAX_RELOAD) {
                        sessionStorage.setItem(RELOAD_KEY, reloadCount + 1);
                        alert(`ランチャーの読み込みに失敗しました。再読み込みします。（${reloadCount + 1}/${MAX_RELOAD}）`);
                        location.reload(true);
                    } else {
                        sessionStorage.removeItem(RELOAD_KEY);
                        alert(`ランチャーの読み込みに失敗しましたが、${MAX_RELOAD}回リロードしたためそのまま開きます。\nページを手動で再読み込みすると改善する可能性があります。`);
                        console.warn('Launcher load failed - 上限に達したため継続');
                    }
                }
            }, 500);
        }

        const skipMaintenance = localStorage.getItem('dqx_dev_mode') === 'true';
        const START_DATE = new Date('2026-05-21T12:30:00');
        const END_DATE   = new Date('2026-05-21T16:00:00');
        const MAINTENANCE_MODE = (new Date() >= START_DATE && new Date() <= END_DATE);

        if (MAINTENANCE_MODE && !skipMaintenance) {
            document.addEventListener('DOMContentLoaded', function() {
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0; left: 0;
                    width: 100%; height: 100%;
                    background: rgba(0, 0, 0, 0.85);
                    z-index: 10000;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    flex-direction: column;
                    font-family: sans-serif;
                `;
                overlay.innerHTML = `<div style="background: #223a70; padding: 30px 60px; border-radius: 20px; color: white; font-size: 2rem; font-weight: bold;">メンテナンス中<br>12:30〜16:00</div>`;
                document.body.appendChild(overlay);
            });
        }

        // ツール定義（ファイル名, グローバル名, 表示名, アイコン）
        const TEST_TOOLS = [
            { file: 'testtool.js', globalName: 'DQtool', name: '構成保存', icon: '📊' },
            { file: 'testtool2.js', globalName: 'DQtool2', name: '傭兵Webhook', icon: '📤' },
            { file: 'testtool3.js', globalName: 'DQtool3', name: '職人ツール', icon: '🛠️' }
        ];
        
        // バージョンチェックを実行
        window.addEventListener('load', checkVersionAndReload);
    </script>
</head>
<body>
<div id="dqx-app"></div>
<script src="./launcher.js"></script>
<script>
window.addEventListener('load', function() {
    // 通常ツールの登録
    DQXTools.register('Checker', {
        name: 'コンテンツ<br>チェッカー',
        icon: '📋',
        desc: '進捗管理',
        url: './tools/checker.js',
        renderFn: 'Checker.render'
    });
    DQXTools.register('exp-m', {
        name: '傭兵用多機能ツール',
        icon: '⚔️',
        desc: '経験値計算<br>タイマー',
        url: './tools/expmercenary.js',
        renderFn: 'Expmercenary.render'
    });
    DQXTools.register('versions', {
        name: '傭兵用多機能ツール<br>旧ver',
        icon: '📜',
        desc: '旧verセレクタ',
        url: './tools/version_selector.js',
        renderFn: 'VersionSelector.render'
    });
    DQXTools.register('help', {
        name: '取扱説明書',
        icon: '📖',
        desc: '使い方<br>Q&A',
        url: './tools/help.js',
        renderFn: 'Help.render'
    });
    DQXTools.register('settings', {
        name: '設定',
        icon: '⚙️',
        desc: 'キャッシュ<br>フィードバック',
        url: './tools/settings.js',
        renderFn: 'Settings.render'
    });

    // テストツールをダミー登録（カード表示用、ツールバー非表示）
    TEST_TOOLS.forEach(tool => {
        DQXTools.register(`test_${tool.file}`, {
            name: `${tool.name} 🔒`,
            icon: tool.icon,
            desc: 'API認証',
            url: '',
            renderFn: '',
            hideInMenu: true,
            requiresToken: true,
            testToolConfig: {
                filename: tool.file,
                globalName: tool.globalName
            }
        });
    });

    DQXTools.init('dqx-app');
});
</script>
<!-- デバッグツール（?debug=1 または ?eruda で有効） -->
<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const enableDebug = urlParams.has('debug') || urlParams.has('eruda');
    
    if (enableDebug) {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/eruda';
        script.onload = function() {
            eruda.init();
            console.log('デバッグモード有効 - 幅:', window.innerWidth);
        };
        document.head.appendChild(script);
    }
})();
</script>
</body>
</html>
