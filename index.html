<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DQXツール</title>
    <style>
        /* ===== ベースリセット ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            margin: 0;
            padding: 20px 0 0 0;
            background: #eef2f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* ダークモード時のbody背景 */
        body.dark-mode {
            background: #0f172a;
        }
        
        /* ===== メインコンテナ ===== */
        #dqx-app {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 0 16px;
        }
        
        /* ===== ランチャーとツールの間隔を固定 ===== */
        #dqx-tool-container {
            margin-top: 28px !important;
        }
        
        /* 各ツールの先頭要素の余白をリセット */
        #dqx-tool-container > *:first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
        
        /* ツール共通のコンテナ調整 */
        #dqx-tool-container .container,
        #dqx-tool-container .c {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
        
        /* ===== スマートフォン（768px以下） ===== */
        @media (max-width: 768px) {
            body {
                padding: 8px 0 0 0;
            }
            #dqx-app {
                padding: 0 8px;
            }
            #dqx-tool-container {
                margin-top: 16px !important;
            }
        }
        
        /* ===== タブレット（769px～1024px） ===== */
        @media (min-width: 769px) and (max-width: 1024px) {
            #dqx-app {
                max-width: 95%;
                padding: 0 20px;
            }
            #dqx-tool-container {
                margin-top: 24px !important;
            }
        }
        
        /* ===== デスクトップ（1025px以上） ===== */
        @media (min-width: 1025px) {
            #dqx-app {
                max-width: 900px;
            }
            #dqx-tool-container {
                margin-top: 28px !important;
            }
        }
    </style>
</head>
<body>

<div id="dqx-app"></div>

<script src="./launcher.js"></script>
<script src="./tools/dqx-checker.js"></script>

<script>
window.addEventListener('load', function() {
    DQXTools.register('daily-checker', {
        name: '📋 日課チェッカー',
        url: './tools/dqx-checker-2.js',
        renderFn: 'DQXDailyChecker.render'
    });
    
    DQXTools.register('exp-calc', {
        name: '⚡ 傭兵用多機能ツール',
        url: './tools/exp-calculator-2.js',
        renderFn: 'ExpCalculator.render'
    });
    
    DQXTools.init('dqx-app');
});
</script>

</body>
</html>
