<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ユッフィーのDQXツール</title>
    <style>
        /* ===== 強制リセット ===== */
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0 !important;
            padding: 20px 0 0 0 !important;
            background: #eef2f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body.dark-mode {
            background: #0f172a;
            padding: 20px 0 0 0 !important;
        }
        
        #dqx-app {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 0 16px;
        }
        
        #dqx-app > div:first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
        
        #dqx-tool-container {
            margin-top: 24px !important;
            padding-bottom: 100px !important;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 12px 0 0 0 !important;
            }
            #dqx-app {
                padding: 0 8px;
            }
            #dqx-tool-container {
                margin-top: 16px !important;
                padding-bottom: 120px !important;
            }
        }
        　　/* メンテナンスオーバーレイ */
    .maintenance-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    
    .maintenance-text {
        font-size: 3rem;
        font-weight: bold;
        color: white;
        text-align: center;
        padding: 20px;
        background: #223a70;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    </style>
</head>
<body>
　 <div class="maintenance-overlay" id="maintenanceOverlay">
    <div class="maintenance-text">
        メンテナンス中
    </div>
   </div>
    
<div id="dqx-app"></div>

<script src="./launcher.js"></script>
<script src="./tools/Checker.js"></script>
<script src="./tools/expmercenary.js"></script>

<script>
window.addEventListener('load', function() {
    DQXTools.register('Checker', {
        name: 'コンテンツ<br>チェッカー',
        url: './tools/Checker.js',
        renderFn: 'Checker.render'
    });
    
    DQXTools.register('exp-m', {
        name: '傭兵用多機能<br>ツールver1.5.5',
        url: './tools/expmercenary.js',
        renderFn: 'Expmercenary.render'
    });
    
    DQXTools.register('test', {
        name: 'ツールテスト枠',
        url: './tools/testtool.js',
        renderFn: 'DQtool.render',
        password: 'yuffyrre1300'
    });
    
    DQXTools.init('dqx-app');
});
</script>

</body>
</html>
