<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DQXツール</title>
    <style>
        /* ===== 強制リセット ===== */
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0 !important;
            padding: 20px 0 0 0 !important;
            background: #eef2f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body.dark-mode {
            background: #0f172a;
            padding: 20px 0 0 0 !important;
        }
        
        #dqx-app {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 0 16px;
        }
        
        #dqx-app > div:first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
        
        #dqx-tool-container {
            margin-top: 24px !important;
            padding-bottom: 100px !important;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 12px 0 0 0 !important;
            }
            #dqx-app {
                padding: 0 8px;
            }
            #dqx-tool-container {
                margin-top: 16px !important;
                padding-bottom: 120px !important;
            }
        }
    </style>
</head>
<body>

<div id="dqx-app"></div>

<script src="./launcher.js"></script>
<!-- 既存のツール（事前読み込み→起動高速化のため残す） -->
<script src="./tools/dqx-checker-mobile-fixed.js"></script>
<script src="./tools/exp-calculator-2.js"></script>
<!-- ★ 新ツールは事前読み込みしない（パスワード入力後に動的読み込みするため） -->

<script>
window.addEventListener('load', function() {
    // 既存ツール（パスワードなし）
    DQXTools.register('daily-checker', {
        name: 'コンテンツ<br>チェッカー',
        url: './tools/dqx-checker-mobile-fixed.js',
        renderFn: 'DQXDailyChecker.render'
    });
    
    DQXTools.register('exp-calc', {
        name: '傭兵用多機能<br>ツールver1.5.5',
        url: './tools/exp-calculator-2.js',
        renderFn: 'ExpCalculator.render'
    });
    
    // ★ 新ツール（パスワード付き）を追加
    DQXTools.register('test', {
        name: 'ツールテスト枠',
        url: './test/testtool.js',
        renderFn: 'DQTtool.render',
        password: 'yuffyrre1300'    // ← パスワード設定
    });
    
    DQXTools.init('dqx-app');
});
</script>

</body>
</html>
